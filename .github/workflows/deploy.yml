name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "dharnilotpal31@gmail.com"
          git config --global user.name "nilotpaldhar2004"

          # Clone space repo using token in URL (correct HF auth format)
          git clone https://nilotpaldhar2004:$HF_TOKEN@huggingface.co/spaces/nilotpaldhar2004/blenderbot-chatbot hf_space

          # Copy deployment files
          cp main.py hf_space/
          cp index.html hf_space/
          cp requirements.txt hf_space/
          cp Dockerfile hf_space/

          cd hf_space
          git add .
          git commit -m "Auto deploy from GitHub" || echo "Nothing to commit"
          git push https://nilotpaldhar2004:$HF_TOKEN@huggingface.co/spaces/nilotpaldhar2004/blenderbot-chatbot main
