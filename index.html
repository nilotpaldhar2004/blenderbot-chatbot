<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlenderBot Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      height: 92vh;
      overflow: hidden;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; font-weight: 600; }
    header span { font-size: 0.75rem; opacity: 0.85; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.93rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .user-bubble {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bot-bubble {
      align-self: flex-start;
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }

    .typing {
      align-self: flex-start;
      background: #f1f3f4;
      color: #80868b;
      padding: 10px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      font-style: italic;
      font-size: 0.88rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e8eaed;
      background: #fff;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #dadce0;
      border-radius: 24px;
      font-size: 0.93rem;
      outline: none;
      transition: border 0.2s;
      min-width: 0;
    }

    #msg-input:focus { border-color: #1a73e8; }

    #send-btn, #clear-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 24px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #send-btn  { background: #1a73e8; color: #fff; }
    #send-btn:hover  { background: #1557b0; }
    #send-btn:disabled { background: #a8c7fa; cursor: not-allowed; }

    #clear-btn { background: #f1f3f4; color: #5f6368; }
    #clear-btn:hover { background: #e8eaed; }

    /* Mobile */
    @media (max-width: 480px) {
      body { padding: 0; }
      .container { border-radius: 0; height: 100vh; max-width: 100%; }
      header h1 { font-size: 0.92rem; }
      header span { display: none; }
      .bubble { max-width: 88%; font-size: 0.9rem; }
      #send-btn, #clear-btn { padding: 10px 12px; font-size: 0.82rem; }
    }

    /* Tablet */
    @media (min-width: 481px) and (max-width: 768px) {
      .container { max-width: 95%; }
      .bubble { max-width: 82%; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>BlenderBot Conversational AI</h1>
    <span>Fine-tuned on blended_skill_talk</span>
  </header>

  <div id="chat-window">
    <div class="bubble bot-bubble">
      Hi! I am BlenderBot, fine-tuned for open-domain conversation. Ask me anything!
    </div>
  </div>

  <div class="input-row">
    <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">Send</button>
    <button id="clear-btn" onclick="clearChat()">Clear</button>
  </div>
</div>

<script>
  // Auto-detect environment:
  // On HF Space -> use relative URL ("/chat")
  // On GitHub Pages -> use full HF Space URL
  const API_BASE = window.location.hostname.includes("hf.space")
    ? ""
    : "https://nilotpaldhar2004-blenderbot-chatbot.hf.space";

  let history = [];

  const input   = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const chatWin = document.getElementById("chat-window");

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) sendMessage();
  });

  function addBubble(text, cls) {
    const div = document.createElement("div");
    div.className = `bubble ${cls}`;
    div.textContent = text;
    chatWin.appendChild(div);
    chatWin.scrollTop = chatWin.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    sendBtn.disabled = true;

    addBubble(text, "user-bubble");

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.textContent = "BlenderBot is typing...";
    chatWin.appendChild(typing);
    chatWin.scrollTop = chatWin.scrollHeight;

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history: history }),
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();

      typing.remove();
      addBubble(data.response, "bot-bubble");

      history.push(text, data.response);
      if (history.length > 10) history = history.slice(-10);

    } catch (err) {
      typing.remove();
      addBubble("Sorry, something went wrong. Please try again.", "bot-bubble");
      console.error(err);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function clearChat() {
    history = [];
    chatWin.innerHTML = `
      <div class="bubble bot-bubble">
        Chat cleared. Start a new conversation!
      </div>`;
  }
</script>

</body>
</html>
