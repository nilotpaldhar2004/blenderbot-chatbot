<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlenderBot Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      height: 90vh;
      overflow: hidden;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }
    header span { font-size: 0.8rem; opacity: 0.85; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.45;
      word-wrap: break-word;
    }

    .user-bubble {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bot-bubble {
      align-self: flex-start;
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }

    .typing {
      align-self: flex-start;
      background: #f1f3f4;
      color: #80868b;
      padding: 10px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      font-style: italic;
      font-size: 0.9rem;
    }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid #e8eaed;
      background: #fff;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #dadce0;
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    #msg-input:focus { border-color: #1a73e8; }

    #send-btn, #clear-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send-btn  { background: #1a73e8; color: #fff; }
    #send-btn:hover  { background: #1557b0; }
    #send-btn:disabled { background: #a8c7fa; cursor: not-allowed; }

    #clear-btn { background: #f1f3f4; color: #5f6368; }
    #clear-btn:hover { background: #e8eaed; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>BlenderBot Conversational AI</h1>
    <span>Fine-tuned on blended_skill_talk</span>
  </header>

  <div id="chat-window">
    <div class="bubble bot-bubble">
      Hi there! I am BlenderBot, fine-tuned for open-domain conversation.
      Ask me anything or just chat!
    </div>
  </div>

  <div class="input-row">
    <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">Send</button>
    <button id="clear-btn" onclick="clearChat()">Clear</button>
  </div>
</div>

<script>
  // Store conversation history for multi-turn context
  let history = [];

  const input   = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const window_ = document.getElementById("chat-window");

  // Send on Enter key
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) sendMessage();
  });

  function addBubble(text, cls) {
    const div = document.createElement("div");
    div.className = `bubble ${cls}`;
    div.textContent = text;
    window_.appendChild(div);
    window_.scrollTop = window_.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    sendBtn.disabled = true;

    addBubble(text, "user-bubble");

    // Show typing indicator
    const typing = document.createElement("div");
    typing.className = "typing";
    typing.textContent = "BlenderBot is typing...";
    window_.appendChild(typing);
    window_.scrollTop = window_.scrollHeight;

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history: history }),
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();

      typing.remove();
      addBubble(data.response, "bot-bubble");

      // Update history for next turn
      history.push(text, data.response);
      // Keep last 10 turns to avoid context overflow
      if (history.length > 10) history = history.slice(-10);

    } catch (err) {
      typing.remove();
      addBubble("Sorry, something went wrong. Is the server running?", "bot-bubble");
      console.error(err);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function clearChat() {
    history = [];
    window_.innerHTML = `
      <div class="bubble bot-bubble">
        Chat cleared. Start a new conversation!
      </div>`;
  }
</script>

</body>
</html>
