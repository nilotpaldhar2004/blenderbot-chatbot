<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>BlenderBot Chat</title><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%' y='55%' text-anchor='middle' dominant-baseline='middle' font-size='100'>💬</text></svg>">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh; /* dynamic viewport height -- fixes mobile keyboard */
      padding: 12px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      height: 92vh;
      height: 92dvh; /* shrinks when mobile keyboard opens */
      overflow: hidden;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; font-weight: 600; }
    header span { font-size: 0.75rem; opacity: 0.85; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      /* Smooth scroll on iOS */
      -webkit-overflow-scrolling: touch;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.93rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .user-bubble {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bot-bubble {
      align-self: flex-start;
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }

    .typing {
      align-self: flex-start;
      background: #f1f3f4;
      color: #80868b;
      padding: 10px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      font-style: italic;
      font-size: 0.88rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e8eaed;
      background: #fff;
      flex-shrink: 0;
      /* Stay above mobile browser nav bar */
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #dadce0;
      border-radius: 24px;
      font-size: 0.93rem;
      outline: none;
      transition: border 0.2s;
      min-width: 0;
      /* Prevent iOS zoom on focus (font must be >= 16px on iOS) */
      font-size: 16px;
    }

    #msg-input:focus { border-color: #1a73e8; }

    #send-btn, #clear-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 24px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      /* Larger tap target on mobile */
      min-height: 44px;
    }

    #send-btn  { background: #1a73e8; color: #fff; }
    #send-btn:hover  { background: #1557b0; }
    #send-btn:disabled { background: #a8c7fa; cursor: not-allowed; }

    #clear-btn { background: #f1f3f4; color: #5f6368; }
    #clear-btn:hover { background: #e8eaed; }

    /* Mobile */
    @media (max-width: 480px) {
      /* Added strict lock for both html and body to stop Android pushing */
      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: fixed; 
        top: 0; left: 0; right: 0; bottom: 0;
      }

      body {
        padding: 0;
      }

      .container {
        position: fixed; /* Locks the app to the visible screen */
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        height: 100%; /* Forces container to fill the locked body */
        border-radius: 0;
        max-width: 100%;
      }

      header { padding: 12px 16px; }
      header h1 { font-size: 0.92rem; }
      header span { display: none; }

      .bubble { max-width: 88%; font-size: 0.92rem; }

      #send-btn, #clear-btn { padding: 10px 12px; font-size: 0.82rem; }
    }

    /* Tablet */
    @media (min-width: 481px) and (max-width: 768px) {
      .container { max-width: 95%; }
      .bubble { max-width: 82%; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Conversational AI</h1>
    <span>Fine-tuned on blended_skill_talk dataset</span>
  </header>

  <div id="chat-window">
    <div class="bubble bot-bubble">
      Hi! I'm a conversational AI assistant built by Nilotpal Dhar. Ask me anything!
    </div>
  </div>

  <div class="input-row">
    <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">Send</button>
    <button id="clear-btn" onclick="clearChat()">Clear</button>
  </div>
</div>

<script>
  // Auto-detect: HF Space uses relative URL, GitHub Pages uses full URL
  const API_BASE = window.location.hostname.includes("hf.space")
    ? ""
    : "https://nilotpaldhar2004-blenderbot-chatbot.hf.space";

  let history = [];

  const input   = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const chatWin = document.getElementById("chat-window");

  // Send on Enter (desktop) -- on mobile Enter submits too
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) sendMessage();
  });

  // Scroll chat to bottom when keyboard opens on mobile
  input.addEventListener("focus", () => {
    setTimeout(() => {
      chatWin.scrollTop = chatWin.scrollHeight;
    }, 300); // wait for keyboard animation to finish
  });

  function addBubble(text, cls) {
    const div = document.createElement("div");
    div.className = `bubble ${cls}`;
    div.textContent = text;
    chatWin.appendChild(div);
    chatWin.scrollTop = chatWin.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    sendBtn.disabled = true;

    addBubble(text, "user-bubble");

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.textContent = "Typing...";
    chatWin.appendChild(typing);
    chatWin.scrollTop = chatWin.scrollHeight;

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history: history }),
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();

      typing.remove();
      addBubble(data.response, "bot-bubble");

      history.push(text, data.response);
      if (history.length > 10) history = history.slice(-10);

    } catch (err) {
      typing.remove();
      addBubble("Sorry, something went wrong. Please try again.", "bot-bubble");
      console.error(err);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function clearChat() {
    history = [];
    chatWin.innerHTML = `
      <div class="bubble bot-bubble">
        Chat cleared. Start a new conversation!
      </div>`;
  }
</script>

</body>
</html>
